<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Изучение испанского языка</title>
  <link rel="stylesheet" href="styles/history.css">
  <link rel="stylesheet" href="styles/history-buttons.css">
  <link rel="stylesheet" href="styles/learn-es.css">
  <link rel="stylesheet" href="styles/translate-float.css">
</head>
<body>
  <div class="history">
    <div class="history__header">
      <div class="learn-es__header-row">
        <h1 class="history__title">Изучение испанского языка</h1>
        <div class="learn-es__controls">
          <button class="learn-es__back-btn" id="trainBtn">
            Тренировка
          </button>
          <button class="learn-es__back-btn" id="phrasesBtn">
            Испанские фразы
          </button>
          <button class="learn-es__back-btn" id="grammarBtn">
            Грамматика
          </button>
        </div>
      </div>
      
      <div class="learn-es__stats">
        <div class="learn-es__stat">
          <span class="learn-es__stat-label">Всего слов:</span>
          <span class="learn-es__stat-value" id="totalWords">0</span>
        </div>
        <div class="learn-es__stat">
          <span class="learn-es__stat-label">Изучено:</span>
          <span class="learn-es__stat-value" id="learnedWords">0</span>
        </div>
        <div class="learn-es__stat">
          <span class="learn-es__stat-label">Прогресс:</span>
          <span class="learn-es__stat-value" id="progressPercent">0%</span>
        </div>
      </div>
      
      <div class="learn-es__progress-bar">
        <div class="learn-es__progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="learn-es__search-section">
      <div class="learn-es__search-header">
        <input 
          type="text" 
          id="learnSearchInput" 
          class="learn-es__search-input" 
          placeholder="Поиск слова или фразы..."
        />
        <button id="learnSearchBtn" class="learn-es__search-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
        </button>
      </div>
      
      <div id="learnSearchResults" class="learn-es__search-results" style="display: none;">
        <!-- Results will be displayed here -->
      </div>
    </div>

    <div class="history__filters">
      <div class="history__filter-group">
        <label class="history__filter-label">Категория</label>
        <select id="categoryFilter" class="history__category-filter">
          <option value="">Все категории</option>
          <option value="verbs">Глаголы (verbos)</option>
          <option value="pronouns">Местоимения (pronombres)</option>
          <option value="numbers">Числа (números)</option>
          <option value="time">Время (tiempo)</option>
          <option value="family">Семья (familia)</option>
          <option value="home">Дом (casa)</option>
          <option value="city">Город (ciudad)</option>
          <option value="food">Еда (comida)</option>
          <option value="nature">Природа (naturaleza)</option>
          <option value="colors">Цвета (colores)</option>
          <option value="emotions">Эмоции (emociones)</option>
          <option value="work">Работа (trabajo)</option>
          <option value="travel">Путешествия (viajes)</option>
          <option value="adjectives">Прилагательные (adjetivos)</option>
          <option value="prepositions">Предлоги и союзы (preposiciones y conjunciones)</option>
          <option value="body">Тело (cuerpo)</option>
          <option value="clothes">Одежда (ropa)</option>
          <option value="weather">Погода (clima)</option>
        </select>
      </div>
      
      <div class="history__filter-group">
        <label class="history__filter-label">Тип</label>
        <select id="typeFilter" class="history__category-filter">
          <option value="">Все типы</option>
          <option value="глагол">Глаголы (verbos)</option>
          <option value="существительное">Существительные (sustantivos)</option>
          <option value="прилагательное">Прилагательные (adjetivos)</option>
          <option value="местоимение">Местоимения (pronombres)</option>
          <option value="числительное">Числительные (numerales)</option>
          <option value="наречие">Наречия (adverbios)</option>
          <option value="предлог">Предлоги (preposiciones)</option>
          <option value="союз">Союзы (conjunciones)</option>
        </select>
      </div>
      
      <div class="history__filter-group">
        <label class="history__filter-label">Сортировка</label>
        <select id="sortFilter" class="history__status-filter">
          <option value="popularity">По популярности</option>
          <option value="alphabet">По алфавиту</option>
        </select>
      </div>

      <div class="history__filter-group">
        <label class="history__filter-label">Статус</label>
        <select id="statusFilter" class="history__status-filter">
          <option value="">Все</option>
          <option value="not-learned">Не изучено</option>
          <option value="learned">Изучено</option>
        </select>
      </div>
    </div>
    
    <div id="wordsList" class="learn-es__list">
      <div class="history__empty">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
        </svg>
        <p>Загрузка слов...</p>
      </div>
    </div>
  </div>

  <!-- Фиксированная кнопка перевода -->
  <button id="translateFloatBtn" class="translate-float-btn" title="Открыть форму перевода">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M5 8h14M5 8a2 2 0 1 1 0-4h14a2 2 0 1 1 0 4M5 8v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8"></path>
    </svg>
  </button>

  <!-- Форма перевода -->
  <div id="translateFloatForm" class="translate-float-form" style="display: none;">
    <div class="translate-float-form__header">
      <div class="translate-float-form__header-left">
        <button id="langSwitchBtn" class="translate-float-form__lang-btn">
          <span id="currentLangLabel">ES → RU</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="17 1 21 5 17 9"></polyline>
            <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
            <polyline points="7 23 3 19 7 15"></polyline>
            <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
          </svg>
        </button>
        <button id="playInputBtn" class="translate-float-form__play-btn translate-float-form__play-btn--header" title="Воспроизвести введённый текст">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
        </button>
      </div>
      <button id="closeTranslateForm" class="translate-float-form__close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="translate-float-form__content">
      <div class="translate-float-form__input-group">
        <textarea id="translateInput" class="translate-float-form__textarea" placeholder="Введите текст для перевода..." rows="3"></textarea>
      </div>

      <div class="translate-float-form__result" id="translateResult" style="display: none;">
        <div class="translate-float-form__result-header">
          <span class="translate-float-form__result-label">Перевод:</span>
          <div class="translate-float-form__result-actions">
            <button id="playTranslationBtn" class="translate-float-form__play-btn" title="Воспроизвести перевод">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
              </svg>
            </button>
            <button id="addToHistoryBtn" class="translate-float-form__add-btn" title="Добавить в историю">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
            </button>
          </div>
        </div>
        <div id="translationText" class="translate-float-form__translation"></div>
      </div>
    </div>
  </div>

  <script src="learn-es-data.js"></script>
  <script src="learn-es.js"></script>
  <script src="translate-float.js"></script>
  <script src="learn-search.js"></script>
</body>
</html>
